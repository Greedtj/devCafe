name: Deploy Apps Script

on:
  push:
    branches:
      - main
    paths:
      - "apps-script/**"
      - ".github/workflows/deploy-apps-script.yml"
  workflow_dispatch:

env:
  APPS_SCRIPT_DEPLOYMENT_ID: AKfycbys6mtJ0QcNGhoE_L4n-6UpHBRRD_JwBJ-d_g4TdoCV4MCvs_m-VGsT3_7quu2aWyE9Kw

jobs:
  deploy:
    name: Push Code.gs and deploy web app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required secrets
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          APPS_SCRIPT_SPREADSHEET_ID: ${{ secrets.APPS_SCRIPT_SPREADSHEET_ID }}
          APPS_SCRIPT_LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.APPS_SCRIPT_LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          test -n "$CLASPRC_JSON" || (echo "Missing GitHub secret: CLASPRC_JSON" && exit 1)
          test -n "$APPS_SCRIPT_SPREADSHEET_ID" || (echo "Missing GitHub secret: APPS_SCRIPT_SPREADSHEET_ID" && exit 1)
          test -n "$APPS_SCRIPT_LINE_CHANNEL_ACCESS_TOKEN" || (echo "Missing GitHub secret: APPS_SCRIPT_LINE_CHANNEL_ACCESS_TOKEN" && exit 1)

      - name: Install clasp
        run: npm install --global @google/clasp

      - name: Write clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          chmod 600 "$HOME/.clasprc.json"

      - name: Push Apps Script source
        working-directory: apps-script
        run: clasp push --force

      - name: Set Apps Script properties
        working-directory: apps-script
        env:
          APPS_SCRIPT_SPREADSHEET_ID: ${{ secrets.APPS_SCRIPT_SPREADSHEET_ID }}
          APPS_SCRIPT_LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.APPS_SCRIPT_LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          SCRIPT_PROPERTIES="$(jq -nc \
            --arg spreadsheetId "$APPS_SCRIPT_SPREADSHEET_ID" \
            --arg lineToken "$APPS_SCRIPT_LINE_CHANNEL_ACCESS_TOKEN" \
            '{SPREADSHEET_ID: $spreadsheetId, LINE_CHANNEL_ACCESS_TOKEN: $lineToken}')"
          clasp run setScriptProperties --params "[$SCRIPT_PROPERTIES]"

      - name: Deploy Apps Script web app
        working-directory: apps-script
        run: clasp deploy --deploymentId "$APPS_SCRIPT_DEPLOYMENT_ID" --description "GitHub Actions ${GITHUB_SHA}"
